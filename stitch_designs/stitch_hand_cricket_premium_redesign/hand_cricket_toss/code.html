<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#ffb95f",
                    "on-surface": "#dfe2f3",
                    "surface-tint": "#4edea3",
                    "on-tertiary": "#472a00",
                    "on-secondary-fixed-variant": "#004e5c",
                    "on-primary-fixed": "#002113",
                    "on-primary-container": "#00422b",
                    "outline": "#86948a",
                    "on-tertiary-container": "#523200",
                    "on-background": "#dfe2f3",
                    "surface-dim": "#0f131f",
                    "secondary": "#4cd7f6",
                    "on-primary": "#003824",
                    "inverse-on-surface": "#2c303d",
                    "surface-container-lowest": "#0a0e1a",
                    "surface-container-high": "#262a37",
                    "surface": "#0f131f",
                    "on-tertiary-fixed": "#2a1700",
                    "surface-variant": "#313442",
                    "on-secondary": "#003640",
                    "on-error-container": "#ffdad6",
                    "inverse-primary": "#006c49",
                    "background": "#0f131f",
                    "surface-container": "#1b1f2c",
                    "tertiary-container": "#e29100",
                    "on-secondary-container": "#00424e",
                    "secondary-fixed-dim": "#4cd7f6",
                    "outline-variant": "#3c4a42",
                    "on-secondary-fixed": "#001f26",
                    "primary-fixed-dim": "#4edea3",
                    "on-error": "#690005",
                    "surface-bright": "#353946",
                    "secondary-fixed": "#acedff",
                    "on-tertiary-fixed-variant": "#653e00",
                    "error-container": "#93000a",
                    "on-primary-fixed-variant": "#005236",
                    "tertiary-fixed-dim": "#ffb95f",
                    "surface-container-highest": "#313442",
                    "surface-container-low": "#171b28",
                    "primary-fixed": "#6ffbbe",
                    "tertiary-fixed": "#ffddb8",
                    "primary-container": "#10b981",
                    "on-surface-variant": "#bbcabf",
                    "inverse-surface": "#dfe2f3",
                    "error": "#ffb4ab",
                    "secondary-container": "#03b5d3",
                    "primary": "#4edea3"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .vortex-gradient {
            background: radial-gradient(circle at center, rgba(226, 145, 0, 0.15) 0%, rgba(15, 19, 31, 0) 70%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-amber { filter: drop-shadow(0 0 12px rgba(255, 185, 95, 0.4)); }
        .glow-primary { filter: drop-shadow(0 0 15px rgba(78, 222, 163, 0.3)); }
        .glow-secondary { filter: drop-shadow(0 0 15px rgba(76, 215, 246, 0.3)); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen selection:bg-primary selection:text-on-primary overflow-hidden">
<!-- Top Navigation Bar (Shared Component Logic) -->
<nav class="flex justify-between items-center px-6 py-4 w-full bg-[#0f131f] dark:bg-[#0f131f] fixed top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-emerald-400" data-icon="sports_cricket">sports_cricket</span>
<span class="font-['Space_Grotesk'] uppercase tracking-[0.05em] text-xl font-black text-emerald-400 tracking-widest">CRICKET ARENA</span>
</div>
<div class="flex gap-6">
<span class="material-symbols-outlined text-slate-400 hover:text-cyan-400 transition-colors cursor-pointer" data-icon="leaderboard">leaderboard</span>
<span class="material-symbols-outlined text-slate-400 hover:text-cyan-400 transition-colors cursor-pointer" data-icon="settings">settings</span>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="relative min-h-screen flex flex-col items-center justify-center pt-16 pb-24 overflow-hidden">
<!-- Background Effects -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] vortex-gradient animate-pulse"></div>
<div class="absolute inset-0 opacity-20" data-alt="converging particles pattern across deep navy sky with golden center glow" style="background-image: radial-gradient(circle, #ffb95f 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
<!-- Title Section -->
<div class="relative z-10 text-center mb-8">
<h1 class="font-headline font-black text-6xl md:text-8xl tracking-tighter text-tertiary glow-amber uppercase mb-4">
                ⚡ THE TOSS
            </h1>
<div class="inline-flex items-center gap-2 px-6 py-2 rounded-full border border-tertiary/30 bg-tertiary/10 backdrop-blur-sm">
<span class="font-label font-bold text-tertiary uppercase text-sm tracking-widest">You called HEADS</span>
</div>
</div>
<!-- Central Action Area -->
<div class="relative z-10 w-full max-w-4xl px-4 flex flex-col md:flex-row items-center justify-between gap-8 md:gap-4">
<!-- Left: Champion -->
<div class="flex flex-col items-center gap-4 w-full md:w-1/3">
<span class="font-headline text-on-surface-variant uppercase tracking-widest text-xs font-bold">Champion</span>
<div class="relative w-full aspect-square glass-panel rounded-full border-2 border-primary glow-primary flex items-center justify-center group">
<span class="text-7xl">✊</span>
<!-- Pump Indicator -->
<div class="absolute -bottom-4 bg-primary text-on-primary rounded-full p-2 flex flex-col items-center animate-bounce">
<span class="material-symbols-outlined text-sm" data-icon="expand_less">expand_less</span>
<span class="material-symbols-outlined text-sm -mt-3" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Center: VS Badge -->
<div class="relative flex items-center justify-center">
<div class="w-20 h-20 rounded-full border-4 border-tertiary flex items-center justify-center bg-surface shadow-[0_0_30px_rgba(255,185,95,0.4)] z-20">
<span class="font-headline font-black text-2xl text-tertiary">VS</span>
</div>
<!-- Radial Glow Ring -->
<div class="absolute w-32 h-32 rounded-full border border-tertiary/20 animate-ping"></div>
</div>
<!-- Right: AI -->
<div class="flex flex-col items-center gap-4 w-full md:w-1/3">
<span class="font-headline text-on-surface-variant uppercase tracking-widest text-xs font-bold">AI Bot</span>
<div class="w-full aspect-square glass-panel rounded-full border-2 border-secondary glow-secondary flex items-center justify-center">
<span class="text-7xl">✊</span>
</div>
</div>
</div>
<!-- Status & Selector Area -->
<div class="relative z-10 mt-12 w-full max-w-2xl px-6">
<div class="text-center mb-8">
<p class="font-body text-on-surface-variant/80 text-lg">Show your fingers for the toss!</p>
</div>
<div class="flex flex-col gap-6">
<div class="text-center">
<span class="font-headline text-[10px] text-tertiary uppercase tracking-[0.2em] font-bold">Pick a number!</span>
</div>
<!-- Bento Grid Selector -->
<div class="grid grid-cols-3 md:grid-cols-6 gap-3">
<button class="glass-panel hover:bg-primary/10 hover:border-primary/50 transition-all duration-300 rounded-xl p-4 flex flex-col items-center justify-center gap-2 group">
<span class="text-2xl group-hover:scale-110 transition-transform">☝️</span>
<span class="font-headline font-bold text-on-surface">1</span>
</button>
<button class="glass-panel hover:bg-primary/10 hover:border-primary/50 transition-all duration-300 rounded-xl p-4 flex flex-col items-center justify-center gap-2 group">
<span class="text-2xl group-hover:scale-110 transition-transform">✌️</span>
<span class="font-headline font-bold text-on-surface">2</span>
</button>
<button class="glass-panel hover:bg-primary/10 hover:border-primary/50 transition-all duration-300 rounded-xl p-4 flex flex-col items-center justify-center gap-2 group">
<span class="text-2xl group-hover:scale-110 transition-transform">🤟</span>
<span class="font-headline font-bold text-on-surface">3</span>
</button>
<button class="glass-panel hover:bg-primary/10 hover:border-primary/50 transition-all duration-300 rounded-xl p-4 flex flex-col items-center justify-center gap-2 group">
<span class="text-2xl group-hover:scale-110 transition-transform">🖖</span>
<span class="font-headline font-bold text-on-surface">4</span>
</button>
<button class="glass-panel hover:bg-primary/10 hover:border-primary/50 transition-all duration-300 rounded-xl p-4 flex flex-col items-center justify-center gap-2 group">
<span class="text-2xl group-hover:scale-110 transition-transform">🖐️</span>
<span class="font-headline font-bold text-on-surface">5</span>
</button>
<button class="glass-panel hover:bg-primary/10 hover:border-primary/50 transition-all duration-300 rounded-xl p-4 flex flex-col items-center justify-center gap-2 group">
<span class="text-2xl group-hover:scale-110 transition-transform">👍</span>
<span class="font-headline font-bold text-on-surface">6</span>
</button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Shared Component Logic) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#0f131f]/95 dark:bg-[#0f131f]/95 backdrop-blur-xl rounded-t-3xl border-t border-emerald-500/15 shadow-[0_-8px_32px_rgba(76,215,246,0.08)]">
<!-- ARENA Active for Game Screens -->
<a class="flex flex-col items-center justify-center bg-emerald-500/10 text-emerald-400 rounded-xl p-2 border-t-2 border-emerald-400 transition-transform active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="stadia_controller">stadia_controller</span>
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-wider mt-1">ARENA</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 p-2 hover:bg-emerald-500/5 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-wider mt-1">STATS</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 p-2 hover:bg-emerald-500/5 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="shield">shield</span>
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-wider mt-1">LOADOUT</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 p-2 hover:bg-emerald-500/5 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-wider mt-1">GEAR</span>
</a>
</nav>
</body></html>
